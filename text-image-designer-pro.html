<div class="container">

<h1>🎨 Text To Image Designer</h1>

<input
id="text"
type="text"
placeholder="Enter Text"
value="Your Text">

<br><br>

<label>Text Color</label>

<input
type="color"
id="textColor"
value="#ffffff">

<br><br>

<label>Font Size</label>

<input
type="range"
id="fontSize"
min="20"
max="120"
value="40">

<br><br>

<h3>Choose Font</h3>

<select id="fontFamily">

<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Georgia">Georgia</option>
<option value="Tahoma">Tahoma</option>
<option value="Impact">Impact</option>
<option value="Courier New">Courier New</option>
<option value="Times New Roman">Times New Roman</option>

</select>

<br><br>

<h3>Text Style</h3>

<label><input type="checkbox" id="bold"> Bold</label>

<label><input type="checkbox" id="italic"> Italic</label>

<label><input type="checkbox" id="shadow"> Shadow</label>

<label><input type="checkbox" id="outline"> Outline</label>

<br><br>

<h3>Opacity</h3>

<input
type="range"
id="opacity"
min="0"
max="100"
value="100">

<span id="opacityValue">100%</span>

<br><br>

<h3>Background Image</h3>

<input
type="file"
id="bgUpload"
accept="image/*">

<br><br>

<h3>Gradient Background</h3>

<input
type="color"
id="color1"
value="#4f46e5">

<input
type="color"
id="color2"
value="#9333ea">

<br><br>

</button>
