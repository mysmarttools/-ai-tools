<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Paraphrasing Tool</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="tool-container">



</div>

<script src="js/script.js"></script>



<div class="tool-container">

    <h1>📝 AI Paraphrasing Tool</h1>

    <p>Rewrite your text naturally while keeping the original meaning.</p>

    <textarea
        id="inputText"
        placeholder="Paste your text here..."
    ></textarea>

    <div class="counter">
        <span id="wordCount">Words: 0</span>
        <span id="charCount">Characters: 0</span>
    </div>

    <div class="button-group">

        <button class="btn-primary" onclick="paraphraseText()">
            ✨ Paraphrase
        </button>

        <button class="btn-danger" onclick="clearParaphrase()">
            🗑 Clear
        </button>

        <button class="btn-success" onclick="copyParaphrase()">
            📋 Copy
        </button>

    </div>

    <div class="output-box">

        <textarea
            id="outputText"
            placeholder="Your paraphrased text..."
            readonly>
            
        </textarea>

    </div>

</div>
<link rel="stylesheet" href="css/style.css">
    </body>

</html>
