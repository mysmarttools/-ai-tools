<br><br>
<br><br>

<br><br>
<button onclick="generateMeta()">Generate</button>

<br><br>

<textarea id="result" rows="6" cols="50"></textarea>
  <textarea id="result" rows="6"></textarea>

<button onclick="copyMeta()">📋 Copy</button>
